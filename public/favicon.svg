<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background Glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#emeraldGrad)" stroke-width="20" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Inner Ring (dashed) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#10b981" stroke-width="6" stroke-dasharray="20 15" opacity="0.5"/>

  <!-- Center Icon: Stylized Syringe & Letter L -->
  <g transform="translate(186, 156) scale(0.28)" fill="none" stroke="url(#emeraldGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Syringe Plunger -->
    <path d="M400 100 L400 40" stroke-width="28"/>
    <path d="M340 40 L460 40" stroke-width="28"/>
    
    <!-- Syringe Body -->
    <rect x="320" y="100" width="160" height="340" rx="30" fill="#09090b" stroke-width="28"/>
    
    <!-- Measurement lines -->
    <line x1="360" y1="180" x2="400" y2="180"/>
    <line x1="360" y1="250" x2="420" y2="250"/>
    <line x1="360" y1="320" x2="400" y2="320"/>
    <line x1="360" y1="390" x2="420" y2="390"/>
    
    <!-- Needle Connector & Needle -->
    <path d="M370 440 L430 440" stroke-width="28"/>
    <path d="M400 440 L400 500" stroke-width="28"/>
  </g>
</svg>
